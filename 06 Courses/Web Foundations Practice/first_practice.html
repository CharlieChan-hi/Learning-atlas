<!-- DOCTYPE声明：告诉浏览器这是一个HTML5文档 -->
<!DOCTYPE html>

<!-- html标签：HTML文档的根元素，lang属性指定页面语言为英语 -->
<html lang="en">

<!-- head部分：包含页面的元数据，不会直接显示在页面上 -->
<head>
    <!-- meta标签：设置页面字符编码为UTF-8，支持中文等多种语言 -->
    <meta charset="UTF-8">
    
    <!-- meta标签：设置视口，使页面在不同设备上都能正常显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- title标签：设置页面标题，会显示在浏览器标签栏上 -->
    <title>你好</title>
</head>

<!-- body部分：包含页面的主要内容，会直接显示在浏览器中 -->
<body>
    <!-- h1标签：一级标题，显示"Hello World!"文本 -->
    <h1>Hello World!</h1>
</body>

</html>
